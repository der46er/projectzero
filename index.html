<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/der46er/webseite@main/assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and dark theme setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Prevent scrolling globally */
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            height: 100lvh;
            width: 100vw;
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            position: relative;
        }

        /* Countdown Container */
        .countdown-container {
            text-align: center;
            padding: 0 20px;
        }

        .timer {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 15px;
            /* Subtle futuristic text glow */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            font-variant-numeric: tabular-nums; /* Prevents numbers from shifting/wobbling */
        }

        .hashtag {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #a1a1aa; /* Zinc-400 */
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Hidden/Barely visible footer aligned to the bottom center */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        footer p {
            cursor: pointer;
            color: #27272a; /* Zinc-800: blends deeply into the black background */
            font-size: 11px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.25; /* Barely visible at first glance */
            transition: all 0.3s ease;
        }

        footer p:hover {
            opacity: 1;
            color: #ffffff;
        }

        /* Responsive scaling for smaller screens */
        @media (max-width: 768px) {
            .timer {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .hashtag {
                font-size: 0.9rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="timer" id="timer">00D 00H 00M 00S</div>
        <div class="hashtag">#pr0jectz3ro</div>
    </div>

    <footer>
        <p onclick="window.location.href='https://thataustrianone.eu/legal/'">
            © <span id="year">2026</span> — @der_46er
        </p>
    </footer>

    <script>
        // Synchronize current year matching page behaviors
        document.getElementById('year').innerText = new Date().getFullYear();

        // Target Date: March 31, 2028, 00:00:00
        const targetDate = new Date("March 31, 2028 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // If the countdown is finished, lock it at zero
            if (difference <= 0) {
                document.getElementById("timer").innerHTML = "00D 00H 00M 00S";
                clearInterval(intervalId);
                return;
            }

            // Time calculations
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Pad numbers with leading zeros for visual consistency
            const formatDays = String(days).padStart(2, '0');
            const formatHours = String(hours).padStart(2, '0');
            const formatMinutes = String(minutes).padStart(2, '0');
            const formatSeconds = String(seconds).padStart(2, '0');

            // Display result with capitalized units for the aesthetic
            document.getElementById("timer").innerHTML = 
                `${formatDays}D ${formatHours}H ${formatMinutes}M ${formatSeconds}S`;
        }

        // Run immediately on load, then update every second
        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
