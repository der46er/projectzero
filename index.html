<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>#pr0jectz3ro</title>
    
    <link id="dynamic-favicon" rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/der46er/webseite@main/assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and dark theme setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Prevent scrolling globally across all viewports */
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            height: 100lvh; /* Modern locked viewport height for mobile browsers */
            width: 100vw;
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            position: relative;
        }

        /* Countdown Container */
        .countdown-container {
            text-align: center;
            padding: 0 10px;
            width: 100%;
            max-width: 100vw;
        }

        .timer {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            font-variant-numeric: tabular-nums;
            white-space: nowrap; /* Forces the timer to stay on one single line */
        }

        .hashtag {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #a1a1aa; /* Zinc-400 */
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Fixed and visible safely at the bottom center of the viewport */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        footer p {
            display: inline-block;
            cursor: pointer;
            color: #27272a; /* Zinc-800: blends deeply into the black background */
            font-size: 11px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.25; /* Slightly adjusted minimum visibility for first-glance detection on mobile panels */
            transition: all 0.3s ease;
            padding: 10px; /* Expands touch target size safely for mobile fingers */
        }

        footer p:hover, footer p:active {
            opacity: 1;
            color: #ffffff;
        }

        /* Responsive scaling ensuring it looks flawless on mobile screens */
        @media (max-width: 768px) {
            .timer {
                /* Dynamically scales based on viewport width so it never wraps or hits edges */
                font-size: 7.2vw; 
                letter-spacing: 1px;
                margin-bottom: 12px;
            }
            .hashtag {
                font-size: 3vw;
                letter-spacing: 3px;
            }
            footer {
                bottom: 30px; /* Moves up slightly to clear safe areas and mobile address bars completely */
            }
            footer p {
                font-size: 10px;
            }
        }

        /* Extra tiny device fallback */
        @media (max-width: 360px) {
            .timer {
                font-size: 6.8vw;
            }
        }
    </style>
</head>
<body>

    <div class="countdown-container">
        <div class="timer" id="timer">00D 00H 00M 00S</div>
        <div class="hashtag" onclick="window.location.href='https://www.tiktok.com/@pr0jectz3ro.eu'" style="cursor: pointer;">#pr0jectz3ro</div>
    </div>

    <footer>
        <p onclick="window.location.href='https://thataustrianone.eu/legal/'">
            © <span id="year">2026</span> — @pr0jectz3ro.eu
        </p>
    </footer>

    <script>
        // Synchronize current year matching page behaviors
        document.getElementById('year').innerText = new Date().getFullYear();

        // Target Date: March 31, 2028, 00:00:00
        const targetDate = new Date("March 31, 2028 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById("timer").innerHTML = "00D 00H 00M 00S";
                clearInterval(intervalId);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            const formatDays = String(days).padStart(2, '0');
            const formatHours = String(hours).padStart(2, '0');
            const formatMinutes = String(minutes).padStart(2, '0');
            const formatSeconds = String(seconds).padStart(2, '0');

            document.getElementById("timer").innerHTML = 
                `${formatDays}D ${formatHours}H ${formatMinutes}M ${formatSeconds}S`;
        }

        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);

        // --- DYNAMIC FAVICON RECOLORING SCRIPT ---
        function recolorFavicon(targetColor = 'white') {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "https://cdn.jsdelivr.net/gh/der46er/webseite@main/assets/favicon.png";

            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width || 32;
                canvas.height = img.height || 32;
                const ctx = canvas.getContext('2d');

                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3];

                    if (alpha > 0) {
                        if (targetColor === 'white') {
                            data[i]     = 255;
                            data[i + 1] = 255;
                            data[i + 2] = 255;
                        } else if (targetColor === 'black') {
                            data[i]     = 0;
                            data[i + 1] = 0;
                            data[i + 2] = 0;
                        }
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                document.getElementById('dynamic-favicon').href = canvas.toDataURL('image/png');
            };
        }

        recolorFavicon('white'); 
    </script>
</body>
</html>
