<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>#pr0jectz3ro | About</title>
    
    <link id="dynamic-favicon" rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/der46er/webseite@main/assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and dark theme setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Prevent scrolling globally across the viewport */
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            height: 100lvh;
            width: 100vw;
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            position: relative;
            padding: 20px;
        }

        /* Main Container */
        .content-wrapper {
            text-align: center;
            width: 100%;
            max-width: 650px;
            z-index: 2;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* The White Outline Box */
        .outline-box {
            width: 100%;
            max-height: 50vh; /* Keeps it perfectly proportioned on mobile and desktop */
            border: 1px solid #ffffff;
            background-color: transparent;
            padding: 30px;
            text-align: left;
            overflow-y: auto; /* Allows scrolling inside the box only if text is long */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
            
            /* Custom scrollbar styles for a clean, futuristic look */
            scrollbar-width: thin;
            scrollbar-color: #27272a transparent;
        }

        /* Custom scrollbar for Webkit browsers */
        .outline-box::-webkit-scrollbar {
            width: 4px;
        }
        .outline-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .outline-box::-webkit-scrollbar-thumb {
            background-color: #27272a;
            border-radius: 2px;
        }

        .about-text {
            font-size: 0.95rem;
            line-height: 1.8;
            font-weight: 400;
            letter-spacing: 1px;
            color: #e4e4e7; /* Zinc-200 */
            white-space: pre-wrap; /* Preserves paragraphs and line breaks from the .txt file */
        }

        /* Bottom Footer */
        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        footer p {
            display: inline-block;
            cursor: pointer;
            color: #27272a; /* Zinc-800 */
            font-size: 11px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.35;
            transition: all 0.3s ease;
            padding: 10px;
        }

        footer p:hover, footer p:active {
            opacity: 1;
            color: #ffffff;
        }

        /* Mobile styling adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }
            .outline-box {
                padding: 20px;
                max-height: 55vh;
            }
            .about-text {
                font-size: 0.85rem;
                line-height: 1.6;
            }
            footer {
                bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>What is Pr0jectz3ro?</h1>
        
        <div class="outline-box">
            <div class="about-text" id="about-content">Loading description...</div>
        </div>
    </div>

    <footer>
        <p onclick="window.location.href='https://thataustrianone.eu/legal/'">
            © <span id="year">2026</span> — @der_46er
        </p>
    </footer>

    <script>
        // Synchronize current year matching page behaviors
        document.getElementById('year').innerText = new Date().getFullYear();

        // Fetch and load the local text file
        async function loadAboutText() {
            const contentElement = document.getElementById('about-content');
            try {
                const response = await fetch('assets/txt-files/about.txt');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                contentElement.textContent = text;
            } catch (error) {
                console.error("Could not load about.txt:", error);
                contentElement.innerHTML = "<span style='color: #ef4444;'>Error loading description. Make sure 'assets/txt-files/about.txt' exists.</span>";
            }
        }

        loadAboutText();

        // --- DYNAMIC FAVICON RECOLORING SCRIPT ---
        function recolorFavicon(targetColor = 'white') {
            const img = new Image();
            img.crossOrigin = "Anonymous"; 
            img.src = "https://cdn.jsdelivr.net/gh/der46er/webseite@main/assets/favicon.png";

            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width || 32;
                canvas.height = img.height || 32;
                const ctx = canvas.getContext('2d');

                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3];

                    if (alpha > 0) {
                        if (targetColor === 'white') {
                            data[i]     = 255;
                            data[i + 1] = 255;
                            data[i + 2] = 255;
                        } else if (targetColor === 'black') {
                            data[i]     = 0;
                            data[i + 1] = 0;
                            data[i + 2] = 0;
                        }
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                document.getElementById('dynamic-favicon').href = canvas.toDataURL('image/png');
            };
        }

        recolorFavicon('white'); 
    </script>
</body>
</html>
